# ================= APPLICATION =================
spring.application.name=gestionatelier
server.port=${PORT:8081}

# ================= JWT =================
jwt.secret=${JWT_SECRET:votreSecretSuperSecureTresLongAuMoins256BitsChangezEnProduction}
jwt.expiration=86400000

# ================= JPA =================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ================= JACKSON =================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Dakar

# ================= LOGGING =================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.atelier.gestionatelier=INFO

# ================= FILE UPLOAD =================
app.upload.dir=./uploads/
app.upload.user-photo-dir=${app.upload.dir}user_photo/
app.upload.model-photo-dir=${app.upload.dir}model_photo/

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= EMAIL CONFIGURATION =================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}

# ================= APP FLAGS =================
app.subscription.enforcement-enabled=true
spring.task.scheduling.enabled=true
spring.mvc.pathmatch.matching-strategy=ant_path_matcher